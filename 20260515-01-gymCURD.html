<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練習範例：健身房會員方案管理系統</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/myCssTools.css">
    <style>
        .table-rwd tbody tr td {
            text-align: center;
        }

        @media screen and (max-width: 990px) {
            .table-rwd thead {
                display: none;
            }

            .table-rwd tbody tr {
                display: block;
                margin-top: 10px;
                border-radius: 10px;
                border: 3px solid var(--sky-pink05);
                box-shadow: 2px 2px 2px 2px var(--sky-ui-bg-A);
            }

            .table-rwd tbody tr td {
                display: block;
                font-size: 20px;
                overflow: hidden;
                text-align: left;
            }

            .table-rwd tbody tr td::before {
                content: attr(data-th) " : ";
                font-size: 20px;
                font-weight: 900;
                color: var(--sky-pink05);
                display: block;
                float: left;
                width: 25%;
                text-align: right;
                padding-right: 5px;
            }

            .table-rwd tbody tr td span {
                display: block;
                float: left;
                width: 75%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 pt-4">
                <div class="display-4 text-center p-2 text-bg-info text-white rounded-3">方案列表</div>
                <button id="add-btn" class="btn btn-primary mt-2">新增方案</button>
                <table class="mt-3 table shadow-lg table-bordered table-rwd">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>ID</th>
                            <th>方案名稱</th>
                            <th>可招收名額</th>
                            <th>上課時段</th>
                            <th>可使用館別</th>
                            <th>課程內容</th>
                            <th>會員等級</th>
                            <th>#</th>
                        </tr>
                    </thead>
                    <tbody id="pdList">
                        <tr>
                            <td data-th="ID">xxxxx</td>
                            <td data-th="方案名稱">xxxx</td>
                            <td data-th="可招收名額">xxxx</td>
                            <td data-th="上課時段">xxxx</td>
                            <td data-th="可使用館別">xxxx</td>
                            <td data-th="課程內容">xxxx</td>
                            <td data-th="會員等級">xxxx</td>
                            <td>
                                <button class="btn btn-warning update_btn" data-bs-toggle="modal"
                                    data-bs-target="#updateModal" data-id="xxx" data-planName="xxx" data-quota="xxx"
                                    data-period="xxx">更新</button>
                                <button class="btn btn-danger" id="delete_btn">刪除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- updateModal 更新產品資料的彈出視窗 -->
    <div class="modal fade" id="updateModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title" id="exampleModalLabel">資料更新</h5>
                    <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="planName" class="form-label col-form-label-lg">方案名稱</label>
                        <input id="planName" type="text" class="form-control form-control-lg is-valid" placeholder="方案不可空白, 最多輸入10個字!!" disabled>
                        <div class="valid-feedback">方案名稱符合規定</div>
                        <div class="invalid-feedback">方案名稱不符合規定</div>
                    </div>
                    <div class="mb-3">
                        <label for="quota" class="form-label col-form-label-lg">可招收名額</label>
                        <input id="quota" type="number" class="form-control form-control-lg is-valid" min="1" max="30" placeholder="每個方案至少 1 人, 最多招收 30 人!!">
                        <div class="valid-feedback">人數符合規定</div>
                        <div class="invalid-feedback">人數不符合規定</div>
                    </div>
                    <div class="mb-3">
                        <label for="period" class="form-label col-form-label-lg">上課時段 <mark
                                class="rounded-2 bg-danger text-white">必選</mark></label>
                        <select id="period" class="form-select form-select-lg is-valid">
                            <option value="" class="text-center text-info fw-bolder" disabled selected>-- 請選擇上課時段 --
                            </option>
                            <option value="早上時段">早上時段</option>
                            <option value="下午時段">下午時段</option>
                            <option value="晚上時段">晚上時段</option>
                            <option value="假日時段">假日時段</option>
                        </select>
                        <div class="valid-feedback"></div>
                        <div class="invalid-feedback">請選擇上課時段</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="updateModal-ok-btn">更新</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script>

        let flag_pnum = true;
        let uid;

        // 主程式
        $(function () {

            $("#pdList").empty(); // 清空

            // 取得產品列表
            axios.get('http://localhost:3000/member')
                .then(function (response) {
                    console.log(response);
                    response.data.forEach(function (item) {
                        const strHtml = `
                        <tr>
                            <td data-th="ID">${item.id}</td>
                            <td data-th="方案名稱">${item.planName}</td>
                            <td data-th="可招收名額">${item.quota}</td>
                            <td data-th="上課時段">${item.period}</td>
                            <td data-th="可使用館別">${item.branch01}</td>
                            <td data-th="課程內容">${item.course01}</td>
                            <td data-th="會員等級">${item.level01}</td>
                            <td data-th="#">
                                <button class="btn btn-warning update_btn" data-bs-toggle="modal"
                                    data-bs-target="#updateModal" data-id="${item.id}" data-name="${item.planName}" data-quota="${item.quota}" data-period="${item.period}">更新</button>
                                <button class="btn btn-danger" id="delete_btn" data-id="${item.id}">刪除</button>
                            </td>
                        </tr>
                        `
                        $("#pdList").append(strHtml);
                    });
                })
                .catch(function (error) {
                    console.log(error);
                })
                .finally(function () {
                    // always executed
                });

            // 監聽更新按鈕 => 事件, .update_btn, 觸發後做何事
            // document => 整個瀏覽器
            $(document).on('click', '.update_btn', function () {
                console.log($(this).data('id'));
                console.log($(this).data('name'));
                console.log($(this).data('quota'));
                console.log($(this).data('period'));

                // 將 .update_btn 隱藏的資料列塞入 updateModal 表單
                $('#planName').val($(this).data('name'));
                $('#quota').val($(this).data('quota'));
                $('#period').val($(this).data('period'));

                uid = $(this).data('id');
            })

            // 監聽更新按鈕 => 事件, #delete_btn, 觸發後做何事
            $(document).on('click', '#delete_btn', function () {
                // console.log($(this).data('id'));
                // 彈出 doouble check 視窗
                Swal.fire({
                    title: "是否確定刪除此方案？",
                    showDenyButton: false,
                    showCancelButton: true,
                    confirmButtonText: "確認",
                    cancelButtonText: "取消",
                    icon: "warning",
                    allowOutsideClick: false
                }).then((result) => {
                    /* Read more about isConfirmed, isDenied below */
                    if (result.isConfirmed) {
                        Swal.fire({
                            title: "方案刪除後將無法復原，是否確定刪除？",
                            showDenyButton: false,
                            showCancelButton: true,
                            confirmButtonText: "確認",
                            cancelButtonText: "取消",
                            icon: "warning",
                            allowOutsideClick: false
                        }).then((result) => {
                            /* Read more about isConfirmed, isDenied below */
                            if (result.isConfirmed) {
                                axios.delete(`http://localhost:3000/member/${$(this).data('id')}`)
                                    .then(function (response) {
                                        console.log(response);
                                        if (response.status == 200) {
                                            // sweetalert 彈出確認 成功
                                            Swal.fire({
                                                title: "方案刪除成功",
                                                showDenyButton: false,
                                                showCancelButton: false,
                                                confirmButtonText: "確認",
                                                icon: "success",
                                                allowOutsideClick: false
                                            }).then((result) => {
                                                /* Read more about isConfirmed, isDenied below */
                                                if (result.isConfirmed) {
                                                    location.href = "20260515-01-gymCURD.html";
                                                };
                                            });
                                        };
                                    })
                                    .catch(function (error) {
                                        console.log(error);
                                    })
                                    .finally(function () {
                                        // always executed
                                    });
                            } else {
                                return;
                            };
                        });
                    } else {
                        return;
                    };
                });
            })



            // ===== 欄位防呆機制與資料更新至後台 =====
            $("#quota").blur(function () {
                $(this).removeClass('is-invalid is-valid');
                if ($(this).val() >= 1 && $(this).val() <= 30) {
                    // 符合規定 is-valid
                    $(this).addClass('is-valid');
                    flag_quota = true;
                } else {
                    // 不符合規定 is-invalid
                    $(this).addClass('is-invalid');
                    flag_quota = false;
                };
            });

            $('#add-btn').click(function (){
                location.href = "20260515-01-gymCreate.html";
            })

            $('#updateModal-ok-btn').click(function () {
                if (flag_pnum) {
                    // 數量欄位符合
                    // 更新至 JSON 中 (丟後端)
                    let dataJSON = {};
                    dataJSON['quota'] = Number($('#quota').val()); // 強制轉換數字
                    dataJSON['period'] = $('#period').val();

                    console.log(JSON.stringify(dataJSON));

                    axios.patch(`http://localhost:3000/member/${uid}`, dataJSON)
                        .then(function (response) {
                            console.log(response);
                            if (response.status == 200) {
                                // sweetalert 彈出確認 成功
                                Swal.fire({
                                    title: "會員方案更新成功",
                                    showDenyButton: false,
                                    showCancelButton: false,
                                    confirmButtonText: "確認",
                                    denyButtonText: `Don't save`,
                                    icon: "success",
                                    allowOutsideClick: false
                                }).then((result) => {
                                    /* Read more about isConfirmed, isDenied below */
                                    if (result.isConfirmed) {
                                        location.href = "20260515-01-gymCURD.html";
                                    };
                                });
                            }
                        })
                        .catch(function (error) {
                            console.log(error);
                        })
                        .finally(function () {
                            // always executed
                        });

                } else {
                    // 數量欄位不符合
                    Swal.fire({
                        title: "輸入錯誤",
                        text: "輸入錯誤，請檢查是否符合規則。",
                        icon: "error",
                        allowOutsideClick: false,
                    });
                }
            });
        });


    </script>
</body>

</html>
