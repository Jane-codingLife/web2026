<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未來學苑文理補習班</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/20260306-04-color.css">
    <style>
        body {
            background-color: var(--neutral-bg01);
        }

        .hearder .title {
            background-color: var(--brand-primary01);
            color: var(--text-light01);
            font-weight: 900;
            font-size: 20px;
            padding: 10px;
            margin-top: 20px;
        }

        .hearder .logo {
            background-image: url(img/Learn_001.avif);
            height: 30vh;
            background-position: center 40%;
            background-size: cover;
        }

        .hearder nav {
            background-color: var(--brand-bg02);
        }

        .hearder nav ul {
            margin-bottom: 0;
        }

        .hearder nav a {
            color: var(--text-light01);
            background-color: var(--brand-primary01b);
            padding: 10px 15px;
            margin: 10px 5px;
            border-radius: 5px;
            box-shadow: 2px 2px 4px 1px var(--brand-primary02);
            transition: transform, background-color 0.5s;
        }

        .hearder nav a:hover {
            transform: scale(1.08);
            background-color: var(--brand-primary03);
            color: var(--brand-primary02);
            font-weight: 900;
        }

        .content .hero, .teachers {
            background-color: var(--neutral-bg02);
            padding-top: 30px;
            padding-bottom: 30px;
            padding-left: 50px;
            padding-right: 50px;
        }

        .content .slists {
            background-color: var(--neutral-white01);
            padding-top: 30px;
            padding-bottom: 30px;
            padding-left: 50px;
            padding-right: 50px;
        }

        .white-space {
            background-color: var(--neutral-white01);
            padding-top: 30px;
        }

        p {
            margin: 0;
            padding: 0;
        }

        .content .hero p {
            font-size: 20px;
        }

        .content .hero a {
            background-color: var(--brand-accent01);
            margin-top: 15px;
            margin-left: 40%;
            margin-right: 40%;
            font-size: 20px;
            color: var(--text-light01);
            font-weight: 900;
            border-radius: 10px;
            padding-top: 10px;
            padding-bottom: 10px;
            box-shadow: 2px 2px 6px 1px var(--text-dark01);
            transition: transform 0.5s;
        }

        .content .hero a:hover {
            transform: scale(1.05);
        }

        .content .slists p {
            background-color: var(--brand-bg01);
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }

        .content .teachers .persion-info {
            background-color: var(--neutral-white01);
            padding: 20px;
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 1px 2px 8px 1px var(--text-dark01);
            font-weight: 900;
        }

        .content .contact {
            margin-bottom: 35px;
        }

        .content .contact p {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
        }
        
        .footer {
            background-color: var(--brand-primary01);
            color: var(--text-light01);
            font-weight: 900;
            padding-top: 10px;
            padding-bottom: 5px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hearder">
            <div class="title text-center">未來學院文理補習班</div>
            <div class="logo"></div>
            <nav class="text-center">
                <ul class="list-unstyled list-inline">
                    <li class="list-inline-item">
                        <a class="d-block text-decoration-none" href="#">招生資訊</a>
                    </li>
                    <li class="list-inline-item">
                        <a class="d-block text-decoration-none" href="#">升學榜單</a>
                    </li>
                    <li class="list-inline-item">
                        <a class="d-block text-decoration-none" href="#">師資介紹</a>
                    </li>
                    <li class="list-inline-item">
                        <a class="d-block text-decoration-none" href="#">課程時間</a>
                    </li>
                    <li class="list-inline-item">
                        <a class="d-block text-decoration-none" href="#">校園資訊</a>
                    </li>
                </ul>
            </nav>
        </div>
        <div class="content">
            <div class="hero text-center">
                <div class="h1">國中．高中升學輔導</div>
                <p>小班制教學 x 專業師資 x 升學規劃</p>
                <p>讓孩子在穩定的學習節奏中持續進步</p>
                <a class="d-block text-decoration-none" href="#">預約試聽</a>
            </div>
            <div class="slists">
                <div class="h2 text-center">升學榜單</div>
                <p class="d-block">113年 台中一中錄取12人</p>
                <p class="d-block">113年 台中女中錄取9人</p>
                <p class="d-block"></p>
            </div>
            <div class="teachers">
                <div class="h2 text-center">師資介紹</div>
                <div class="persion-info">
                    <div class="h5 text-info person">數學 | 林老師</div>
                    <p>15年升學教學經驗，專長建立數學觀念與解題策略。</p>
                </div>
                <div class="persion-info">
                    <div class="h5 text-info person">自然 | 黃老師</div>
                    <p>擅長統整自然科重點，讓複雜觀念變得容易理解</p>
                </div>
            </div>
            <div class="white-space"></div>
            <div class="contact text-center">
                <p>地址：台中市北區學士路88號</p>
                <p>電話：04-2233-6688</p>
                <p>服務時間：13:00 - 21:30</p>
            </div>
        </div>
        <div class="footer text-center">
            <p>未來學苑補習班 © 2026</p>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
